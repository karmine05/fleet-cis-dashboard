services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fleet_cis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fleet_cis_network

  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fleet_cis_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: fleet-cis-dashboard-backend
    ports:
      - "5001:5001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fleet_cis
      - REDIS_URL=redis://redis:6379/0
      - FLEET_URL=${FLEET_URL}
      - FLEET_API_TOKEN=${FLEET_API_TOKEN}
      - ALLOWED_ORIGINS=http://localhost:8081
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fleet_cis_network

  sync:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: fleet-cis-dashboard-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fleet_cis
      - REDIS_URL=redis://redis:6379/0
      - FLEET_URL=${FLEET_URL}
      - FLEET_API_TOKEN=${FLEET_API_TOKEN}
      - SYNC_INTERVAL_MINUTES=15
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fleet_cis_network
    command: python backend/sync_daemon.py

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - fleet_cis_network

volumes:
  postgres_data:

networks:
  fleet_cis_network:
    driver: bridge
